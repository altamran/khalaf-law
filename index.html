<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const GOLD = "#b8922a";
const GOLD_L = "#d4a843";
const INK = "#0d1117";

const S = {
  app: { display:"flex", minHeight:"100vh", fontFamily:"'Tajawal',sans-serif", direction:"rtl", background:"#faf7f0" },
  sidebar: { width:252, background:INK, display:"flex", flexDirection:"column", flexShrink:0, borderLeft:"1px solid rgba(184,146,42,0.15)" },
  sbBrand: { padding:"22px 18px 16px", borderBottom:"1px solid rgba(184,146,42,0.1)" },
  sbSeal: { width:38, height:38, background:"linear-gradient(135deg,#b8922a,#d4a843)", borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"serif", fontSize:19, color:INK, fontWeight:700, marginBottom:10 },
  sbNav: { padding:"14px 0", flex:1, overflowY:"auto" },
  sbSec: { fontSize:9, color:"rgba(184,146,42,0.5)", fontWeight:700, letterSpacing:"1.5px", padding:"10px 18px 4px", textTransform:"uppercase" },

  main: { flex:1, display:"flex", flexDirection:"column", minWidth:0 },

  btnP: { background:"linear-gradient(135deg,#b8922a,#d4a843)", color:INK },
  btnO: { background:"transparent", color:"#5a4a35", border:"1.5px solid rgba(184,146,42,0.25)" },
  btnD: { background:"rgba(239,68,68,0.07)", color:"#dc2626", border:"1.5px solid rgba(239,68,68,0.18)" },
  input: { width:"100%", background:"#faf7f0", border:"1.5px solid rgba(184,146,42,0.22)", borderRadius:8, padding:"9px 12px", fontFamily:"'Tajawal',sans-serif", fontSize:13, color:"#2a1f0e", outline:"none", direction:"rtl", boxSizing:"border-box" },
  label: { display:"block", fontSize:12, fontWeight:700, color:"#5a4a35", marginBottom:5 },
  tag: { display:"inline-block", padding:"2px 9px", borderRadius:20, fontSize:11, fontWeight:600 },
};

// ══════════════════════════════════════════════════════════
// STYLE GUIDE للمساعد القانوني (مع الأنظمة)
// ══════════════════════════════════════════════════════════
const STYLE_GUIDE_LEGAL = `أنت المساعد القانوني الخاص للمحامي خلف التمران. تكتب وتحلل بأسلوبه الخاص تماماً.

═══ قاعدة إلزامية لا استثناء فيها ═══
قبل أي إجابة، افحص الأنظمة المرفقة في رسالة المستخدم تحت عنوان "=== الأنظمة القانونية المرفقة ===".
- إذا وجدت نصاً ذا صلة بالموضوع: استند إليه حصراً واذكر رقم المادة كما ورد فيه حرفياً.
- إذا لم تجد نصاً صريحاً: قل صراحةً "لم أجد نصاً صريحاً في الأنظمة المرفقة، غير أن المبدأ العام يقضي بـ..." ولا تخترع أرقام مواد.
- لا تجيب من ذاكرتك العامة مباشرةً دون هذا الفحص أبداً.

═══ أسلوب خلف التمران الذي تلتزم به ═══
- تخاطب القاضي مباشرة: "فضيلة ناظر الدعوى" و"فضيلتكم"
- تستخدم جملاً حاسمة: "هذه الدعوى تستند على صحيح النظام" — "ما زعمه المدعى عليه لا يقوم على سند صحيح من النظام" — "ما ذكره المدعي عبارة عن دعوى مرسلة لا ينهض بمثلها حق" — "المدعي لم يحرر دعواه"
- تفكك حجج الخصم ورقة ورقة وتبين عجزه عن الإثبات
- تختم كل فقرة بجملة قاطعة: "مما يفقدها حجيتها نظامًا" أو "لا تقوم على بينة معتبرة"
- ترتب: أولاً — ثانياً — ثالثاً مع ترقيم داخلي 1، 2، 3
- تبدأ المذكرات بالبسملة دائماً
- نبرة الثقة: "نتمسك بأن" و"يثبت لفضيلتكم"

═══ قواعد الاستناد النظامي ═══
عندما تُرفق الأنظمة في رسالة المستخدم:
1. ابحث في النص المرفق عن المواد ذات الصلة بالموضوع
2. اذكر رقم المادة الحرفي كما ورد في النص المرفق
3. اقتبس نص المادة أو جوهرها مباشرة من النص المرفق
4. اربط نص المادة بالواقعة: "نصت المادة (كذا) على أن... وهو ما يتحقق في واقعتنا لأن..."
5. إذا لم تجد المادة في النص المرفق فقل "وفقاً لأحكام النظام" دون اختراع رقم
6. لا تستخدم أرقام مواد من ذاكرتك العامة — فقط من النص المرفق

═══ عند تعدد الأنظمة ═══
إذا أُرفق أكثر من نظام، فلكل نظام مجاله:
- اربط كل مادة بنظامها الصحيح صراحةً: "المادة (كذا) من نظام العمل" — "المادة (كذا) من نظام الإثبات"
- لا تخلط بين أحكام الأنظمة
- استخدم كل نظام فيما يختص به`;

// ══════════════════════════════════════════════════════════
// STYLE GUIDE للمناقشة الحرة (بدون قيود الأنظمة)
// ══════════════════════════════════════════════════════════
const STYLE_GUIDE_FREE = `أنت مساعد ذكي متعدد المجالات تحدث مع المحامي خلف التمران.
في هذه الخانة يمكنك مناقشة أي موضوع بحرية تامة: قانوني، عام، علمي، تقني، أدبي، شخصي، أو أي شيء آخر.
- أجب بأسلوب واضح ومباشر باللغة العربية الفصيحة
- لا قيود على المواضيع هنا — هذه محادثة حرة مفتوحة
- إذا كان الموضوع قانونياً يمكنك المناقشة بحرية دون التقيد بأنظمة محددة
- كن صريحاً وصادقاً وأعطِ رأيك عند الطلب`;

// ══════════════════════════════════════════════════════════
// STYLE GUIDE لتحليل الملفات
// ══════════════════════════════════════════════════════════
const STYLE_GUIDE_FILES = `أنت المساعد القانوني الخاص للمحامي خلف التمران. مهمتك تحليل الملفات والمستندات المرفقة.
عند تحليل أي مستند:
1. ابدأ بتحديد نوع المستند وطبيعته القانونية
2. استخرج أهم البنود والمعلومات الجوهرية
3. حدد نقاط القوة والضعف في المستند
4. اذكر أي مخاطر قانونية أو ملاحظات مهمة
5. قدم توصياتك بأسلوب خلف التمران القانوني الحاسم
- تكتب بأسلوب خلف التمران: حاسم، منظم، مستند للنظام
- تبدأ بالبسملة عند كتابة أي مذكرة أو تحليل رسمي`;

function NavItem({ icon, label, id, active, onClick, badge }) {
  return (
    <div onClick={() => onClick(id)} style={{
      display:"flex", alignItems:"center", gap:10, padding:"10px 18px", cursor:"pointer",
      borderRight:`3px solid ${active ? GOLD : "transparent"}`,
      background: active ? "rgba(184,146,42,0.1)" : "transparent",
      color: active ? GOLD_L : "rgba(255,255,255,0.5)",
      fontSize:13, fontWeight:500, transition:"all .16s", userSelect:"none"
    }}>
      <span style={{ fontSize:15 }}>{icon}</span>
      <span style={{ flex:1 }}>{label}</span>
      {badge !== undefined && badge > 0 && (
        <span style={{ background:"rgba(184,146,42,0.16)", color:GOLD_L, fontSize:10, fontWeight:700, padding:"1px 7px", borderRadius:20 }}>{badge}</span>
      )}
    </div>
  );
}

function Modal({ open, onClose, title, children, wide }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(13,17,23,0.5)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:15, padding:28, width:"90%", maxWidth:wide?700:540, maxHeight:"88vh", overflowY:"auto", boxShadow:"0 8px 48px rgba(0,0,0,0.14)" }}>
        <div style={{ fontSize:15, fontWeight:800, color:"#2a1f0e", marginBottom:18, paddingBottom:13, borderBottom:"1px solid rgba(184,146,42,0.18)" }}>{title}</div>
        {children}
      </div>
    </div>
  );
}

function Spinner({ small }) {
  const s = small ? 18 : 24;
  return <div style={{ width:s, height:s, border:`2.5px solid rgba(184,146,42,0.2)`, borderTopColor:GOLD, borderRadius:"50%", animation:"spin .8s linear infinite", flexShrink:0 }} />;
}

function Fg({ label, children, last }) {
  return <div style={{ marginBottom:last?0:15 }}><label style={S.label}>{label}</label>{children}</div>;
}

const today = () => new Date().toLocaleDateString("ar-SA", { year:"numeric", month:"2-digit", day:"2-digit" });
const STORAGE = { sys:"kh_sys4", bank:"kh_bank4", stats:"kh_stats4", key:"kh_apikey" };
const loadLS = (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } };
const saveLS = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// ══════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════
function App() {
  const [unlocked, setUnlocked] = useState(() => sessionStorage.getItem("kh_auth") === "1");
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState(false);

  const checkPassword = () => {
    if (pwInput === "khalafqanoonksa2030") {
      sessionStorage.setItem("kh_auth", "1");
      setUnlocked(true);
    } else {
      setPwError(true);
      setTimeout(() => setPwError(false), 2000);
    }
  };

  if (!unlocked) {
    return (
      <div style={{ minHeight:"100vh", background:"#0d1117", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Tajawal',sans-serif", direction:"rtl" }}>
        <style>{"@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');"}</style>
        <div style={{ background:"#fff", borderRadius:16, padding:"40px 36px", width:"90%", maxWidth:380, textAlign:"center", boxShadow:"0 8px 48px rgba(0,0,0,0.3)" }}>
          <div style={{ width:52, height:52, background:"linear-gradient(135deg,#b8922a,#d4a843)", borderRadius:12, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"serif", fontSize:26, color:"#0d1117", fontWeight:700, margin:"0 auto 16px" }}>خ</div>
          <div style={{ fontSize:18, fontWeight:800, color:"#2a1f0e", marginBottom:4 }}>منصة خلف</div>
          <div style={{ fontSize:12, color:"#8a7a65", marginBottom:28 }}>التمران القانونية الخاصة</div>
          <input type="password" value={pwInput} onChange={e=>setPwInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&checkPassword()} placeholder="كلمة المرور"
            style={{ width:"100%", border:`1.5px solid ${pwError?"#dc2626":"rgba(184,146,42,0.3)"}`, borderRadius:8, padding:"10px 14px", fontFamily:"'Tajawal',sans-serif", fontSize:14, color:"#2a1f0e", outline:"none", background:"#faf7f0", boxSizing:"border-box", textAlign:"center", marginBottom:8 }}
            autoFocus />
          {pwError && <div style={{ fontSize:12, color:"#dc2626", marginBottom:8 }}>كلمة المرور غير صحيحة</div>}
          <button onClick={checkPassword} style={{ width:"100%", background:"linear-gradient(135deg,#b8922a,#d4a843)", color:"#0d1117", border:"none", borderRadius:8, padding:"11px", fontFamily:"'Tajawal',sans-serif", fontSize:14, fontWeight:700, cursor:"pointer", marginTop:4 }}>دخول</button>
        </div>
      </div>
    );
  }

  const [page, setPage] = useState("chat");
  const [systems, setSystems] = useState(() => loadLS(STORAGE.sys, []));
  const [bank, setBank] = useState(() => loadLS(STORAGE.bank, []));
  const [stats, setStats] = useState(() => loadLS(STORAGE.stats, { cases:0, memos:0 }));
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(STORAGE.key) || "");
  const [modal, setModal] = useState(null);
  const [notifyMsg, setNotifyMsg] = useState("");
  const [bankFilter, setBankFilter] = useState("all");
  const notifTimer = useRef(null);

  useEffect(() => { saveLS(STORAGE.sys, systems); }, [systems]);
  useEffect(() => { saveLS(STORAGE.bank, bank); }, [bank]);
  useEffect(() => { saveLS(STORAGE.stats, stats); }, [stats]);

  const toast = msg => {
    setNotifyMsg(msg);
    clearTimeout(notifTimer.current);
    notifTimer.current = setTimeout(() => setNotifyMsg(""), 3200);
  };

  const callApi = async (messages, systemPrompt, extraOptions = {}) => {
    if (!apiKey) { setModal("settings"); throw new Error("NO_KEY"); }
    let r;
    try {
      r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers: { "Content-Type":"application/json", "x-api-key":apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:4000, system: systemPrompt || STYLE_GUIDE_LEGAL, messages, ...extraOptions })
      });
    } catch { toast("❌ خطأ في الشبكة"); throw new Error("NET_ERR"); }
    if (r.status === 401) { toast("❌ المفتاح غير صحيح"); setModal("settings"); throw new Error("BAD_KEY"); }
    if (r.status === 429) { toast("⚠️ تجاوزت الحد — انتظر دقيقة"); throw new Error("RATE"); }
    if (!r.ok) { toast("❌ خطأ: " + r.status); throw new Error("ERR"); }
    const d = await r.json();
    if (d.error) { toast("❌ " + d.error.message); throw new Error("API"); }
    return d.content?.[0]?.text || "";
  };

  const pageTitles = {
    chat:"المساعد القانوني",
    free:"المناقشة الحرة",
    files:"تحليل الملفات والمستندات",
    search:"البحث في الأنظمة",
    systems:"الأنظمة واللوائح",
    bank:"بنك الخبرة"
  };

  return (
    <div style={S.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Amiri:wght@400;700&display=swap');
        @keyframes spin { to { transform:rotate(360deg); } }
        * { box-sizing:border-box; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-thumb { background:rgba(184,146,42,0.2); border-radius:3px; }
        textarea:focus, input:focus, select:focus { border-color:#b8922a !important; background:#fff !important; outline:none; }
        .file-drop-active { border-color:#b8922a !important; background:rgba(184,146,42,0.06) !important; }
      `}</style>

      <aside style={S.sidebar}>
        <div style={S.sbBrand}>
          <div style={S.sbSeal}>خ</div>
          <div style={{ fontSize:14, fontWeight:800, color:"#fff" }}>منصة خلف</div>
          <div style={{ fontSize:10, color:GOLD, marginTop:2 }}>التمران القانونية الخاصة</div>
        </div>
        <nav style={S.sbNav}>
          <div style={S.sbSec}>الأدوات الرئيسية</div>
          <NavItem id="chat"   icon="⚖️" label="المساعد القانوني"          active={page==="chat"}   onClick={setPage} />
          <NavItem id="free"   icon="💬" label="مناقشة حرة"                active={page==="free"}   onClick={setPage} />
          <NavItem id="files"  icon="📎" label="تحليل ملفات ومستندات"      active={page==="files"}  onClick={setPage} />
          <NavItem id="search" icon="🔍" label="البحث في الأنظمة"          active={page==="search"} onClick={setPage} />
          <div style={S.sbSec}>المكتبة</div>
          <NavItem id="systems" icon="📋" label="الأنظمة واللوائح" active={page==="systems"} onClick={setPage} badge={systems.length} />
          <NavItem id="bank"    icon="🗂" label="بنك الخبرة"        active={page==="bank"}    onClick={setPage} badge={bank.length} />
        </nav>
        <div style={S.sbFooter}>
          <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:10 }}>
            <div style={{ width:32, height:32, background:"linear-gradient(135deg,#b8922a,#d4a843)", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:800, color:INK }}>خ</div>
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:"#fff" }}>خلف التمران</div>
              <div style={{ fontSize:10, color:GOLD }}>محامٍ — المنطقة الشرقية</div>
            </div>
          </div>
          <button onClick={()=>setModal("settings")} style={{ width:"100%", background:"rgba(184,146,42,0.08)", border:"1px solid rgba(184,146,42,0.2)", color:"rgba(255,255,255,0.6)", padding:"8px 0", borderRadius:8, fontFamily:"'Tajawal',sans-serif", fontSize:12, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
            ⚙️ إعدادات API
            <span style={{ width:7, height:7, borderRadius:"50%", background:apiKey?"#22c55e":"#dc2626" }} />
          </button>
        </div>
      </aside>

      <main style={S.main}>
        <header style={S.topbar}>
          <div style={{ fontSize:16, fontWeight:800, color:"#2a1f0e", flex:1 }}>{pageTitles[page]}</div>
          {page==="systems" && <button onClick={()=>setModal("addSys")} style={{...S.btn,...S.btnP}}>+ إضافة نظام</button>}
          {page==="bank"    && <button onClick={()=>setModal("addBank")} style={{...S.btn,...S.btnP}}>+ إضافة عنصر</button>}
        </header>

        <div style={["chat","free","files"].includes(page) ? {} : S.content}>
          {page==="chat"    && <ChatPage    systems={systems} callApi={callApi} setStats={setStats} toast={toast} setBank={setBank} />}
          {page==="free"    && <FreePage    callApi={callApi} toast={toast} setBank={setBank} />}
          {page==="files"   && <FilesPage   callApi={callApi} toast={toast} setBank={setBank} />}
          {page==="search"  && <SearchPage  systems={systems} bank={bank} />}
          {page==="systems" && <SystemsPage systems={systems} setSystems={setSystems} toast={toast} />}
          {page==="bank"    && <BankPage    bank={bank} setBank={setBank} bankFilter={bankFilter} setBankFilter={setBankFilter} toast={toast} />}
        </div>
      </main>

      <AddSysModal  open={modal==="addSys"}    onClose={()=>setModal(null)} setSystems={setSystems} toast={toast} />
      <AddBankModal open={modal==="addBank"}   onClose={()=>setModal(null)} setBank={setBank} toast={toast} />
      <SettingsModal open={modal==="settings"} onClose={()=>setModal(null)} apiKey={apiKey} setApiKey={setApiKey} toast={toast} />

      {notifyMsg && (
        <div style={{ position:"fixed", bottom:20, left:20, background:INK, color:"#fff", padding:"11px 18px", borderRadius:9, fontSize:13, fontWeight:600, borderRight:`3px solid ${GOLD}`, zIndex:9999, maxWidth:300 }}>
          {notifyMsg}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// مكوّن المحادثة المشترك (يُستخدم في Chat و Free)
// ══════════════════════════════════════════════════════════
function ChatBase({ systemPrompt, welcomeMsg, quickPrompts, statusBar, callApi, toast, setBank, buildUserContent }) {
  const [messages, setMessages] = useState([{ role:"assistant", text: welcomeMsg }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const textareaRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    const userContent = buildUserContent ? buildUserContent(text) : text;
    const newMessages = [...messages, { role:"user", text }];
    setMessages(newMessages);
    setInput("");
    setLoading(true);

    const apiMessages = newMessages.map((m, idx) => ({
      role: m.role === "assistant" ? "assistant" : "user",
      content: (m.role === "user" && idx === newMessages.length - 1) ? userContent : m.text
    }));

    try {
      const reply = await callApi(apiMessages, systemPrompt);
      setMessages(prev => [...prev, { role:"assistant", text:reply }]);
    } catch(e) {
      if (e.message !== "NO_KEY" && e.message !== "BAD_KEY") {
        setMessages(prev => [...prev, { role:"assistant", text:"❌ حدث خطأ في الاتصال. تحقق من مفتاح API وأعد المحاولة.", error:true }]);
      }
    } finally { setLoading(false); }
  };

  const saveToBank = (text) => {
    const title = text.substring(0, 60) + (text.length > 60 ? "..." : "");
    setBank(b => [{ id:Date.now(), type:"صيغة", title, text, date:today() }, ...b]);
    toast("💾 تم الحفظ في بنك الخبرة");
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 52px)" }}>
      {statusBar}

      <div style={{ flex:1, overflowY:"auto", padding:"20px 24px", display:"flex", flexDirection:"column", gap:16 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display:"flex", flexDirection:"column", alignItems: m.role==="user"?"flex-end":"flex-start", gap:4 }}>
            <div style={{
              maxWidth:"82%",
              background: m.role==="user" ? "linear-gradient(135deg,#b8922a,#d4a843)" : m.error ? "rgba(239,68,68,0.08)" : "#fff",
              color: m.role==="user" ? INK : "#2a1f0e",
              border: m.role==="user" ? "none" : m.error ? "1px solid rgba(239,68,68,0.2)" : "1px solid rgba(184,146,42,0.18)",
              borderRadius: m.role==="user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
              padding:"12px 16px", fontSize:13.5, lineHeight:1.85, whiteSpace:"pre-wrap", wordBreak:"break-word",
              fontFamily: m.role==="assistant" ? "'Amiri',serif" : "'Tajawal',sans-serif",
            }}>{m.text}</div>
            {m.role==="assistant" && !m.error && i > 0 && (
              <button onClick={() => saveToBank(m.text)} style={{ fontSize:11, color:"#8a7a65", background:"none", border:"none", cursor:"pointer", padding:"2px 6px" }}>
                💾 حفظ في بنك الخبرة
              </button>
            )}
          </div>
        ))}
        {loading && (
          <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 0" }}>
            <Spinner small />
            <span style={{ fontSize:12, color:"#8a7a65" }}>يكتب...</span>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {quickPrompts && (
        <div style={{ padding:"8px 20px", display:"flex", gap:7, flexWrap:"wrap", borderTop:"1px solid rgba(184,146,42,0.1)", background:"#faf7f0" }}>
          {quickPrompts.map((p,i) => (
            <button key={i} onClick={() => { setInput(p.text); textareaRef.current?.focus(); }}
              style={{ padding:"4px 12px", borderRadius:20, border:"1.5px solid rgba(184,146,42,0.25)", background:"#fff", color:"#5a4a35", fontSize:12, fontWeight:600, cursor:"pointer" }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=GOLD;e.currentTarget.style.color=GOLD;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(184,146,42,0.25)";e.currentTarget.style.color="#5a4a35";}}>
              {p.label}
            </button>
          ))}
        </div>
      )}

      <div style={{ padding:"12px 20px", background:"#fff", borderTop:"1px solid rgba(184,146,42,0.15)", display:"flex", gap:10, alignItems:"flex-end" }}>
        <textarea ref={textareaRef} value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }}
          placeholder="اكتب رسالتك... (Enter للإرسال، Shift+Enter لسطر جديد)"
          style={{ ...S.input, minHeight:52, maxHeight:180, resize:"none", lineHeight:1.7, flex:1 }} rows={2} />
        <button onClick={send} disabled={loading||!input.trim()} style={{ ...S.btn, ...S.btnP, padding:"14px 20px", opacity:(loading||!input.trim())?0.6:1, flexShrink:0 }}>
          {loading ? <Spinner small /> : "إرسال ↑"}
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// FILES PAGE — تحليل الملفات والمستندات
// ══════════════════════════════════════════════════════════
function FilesPage({ callApi, toast, setBank }) {
  const [files, setFiles] = useState([]);
  const [question, setQuestion] = useState("");
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const fileInputRef = useRef(null);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);

  const ACCEPTED = {
    "image/jpeg":true, "image/jpg":true, "image/png":true, "image/gif":true, "image/webp":true,
    "application/pdf":true,
    "application/msword":true,
    "application/vnd.openxmlformats-officedocument.wordprocessingml.document":true,
    "text/plain":true
  };

  const addFiles = (newFiles) => {
    const arr = Array.from(newFiles).filter(f => {
      if (ACCEPTED[f.type]) return true;
      // قبول حسب الامتداد أيضاً
      const ext = f.name.split(".").pop().toLowerCase();
      return ["jpg","jpeg","png","gif","webp","pdf","doc","docx","txt"].includes(ext);
    });
    if (!arr.length) { toast("⚠️ صيغة الملف غير مدعومة"); return; }
    setFiles(prev => [...prev, ...arr.map(f => ({ file:f, id:Date.now()+Math.random() }))]);
  };

  const removeFile = (id) => setFiles(prev => prev.filter(f => f.id !== id));

  const fileToBase64 = (file) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("فشل قراءة الملف"));
    r.readAsDataURL(file);
  });

  const getMediaType = (file) => {
    if (file.type) return file.type;
    const ext = file.name.split(".").pop().toLowerCase();
    const map = { jpg:"image/jpeg", jpeg:"image/jpeg", png:"image/png", gif:"image/gif", webp:"image/webp", pdf:"application/pdf", txt:"text/plain" };
    return map[ext] || "application/octet-stream";
  };

  const isImage = (file) => {
    const mt = getMediaType(file);
    return mt.startsWith("image/");
  };

  const isPDF = (file) => getMediaType(file) === "application/pdf";

  const isWord = (file) => {
    const mt = getMediaType(file);
    return mt.includes("word") || mt.includes("document");
  };

  const analyze = async () => {
    if (!files.length && !question.trim()) { toast("⚠️ أرفق ملفاً أو اكتب سؤالاً"); return; }
    if (loading) return;
    setLoading(true);

    const userDisplayMsg = question.trim()
      ? `${question.trim()}${files.length ? `\n\n📎 ${files.length} ملف مرفق` : ""}`
      : `📎 ${files.length} ملف مرفق — تحليل عام`;

    try {
      // بناء محتوى الرسالة للـ API
      const contentParts = [];

      // أضف الملفات
      for (const { file } of files) {
        const mt = getMediaType(file);
        if (isImage(file)) {
          const b64 = await fileToBase64(file);
          contentParts.push({ type:"image", source:{ type:"base64", media_type:mt, data:b64 } });
        } else if (isPDF(file)) {
          const b64 = await fileToBase64(file);
          contentParts.push({ type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } });
        } else if (isWord(file)) {
          // ملفات Word: قراءة كنص (أفضل ما يمكن في المتصفح)
          const text = await file.text().catch(() => "[تعذّر قراءة محتوى ملف Word — يُنصح بنسخ النص يدوياً]");
          contentParts.push({ type:"text", text:`=== محتوى ملف Word: ${file.name} ===\n${text}` });
        } else {
          // ملفات نصية
          const text = await file.text().catch(() => "[تعذّر قراءة الملف]");
          contentParts.push({ type:"text", text:`=== محتوى الملف: ${file.name} ===\n${text}` });
        }
      }

      // أضف سؤال المستخدم
      const userQ = question.trim() || "حلل هذا المستند وأخرج أهم المعلومات القانونية والبنود الجوهرية والملاحظات المهمة.";
      contentParts.push({ type:"text", text:userQ });

      const newMessages = [...messages, { role:"user", text:userDisplayMsg }];
      setMessages(newMessages);
      setQuestion("");

      const apiMessages = [
        ...messages.slice(0,-0).map(m => ({ role: m.role==="assistant"?"assistant":"user", content: m.text })),
        { role:"user", content: contentParts }
      ];

      const reply = await callApi(apiMessages, STYLE_GUIDE_FILES);
      setMessages(prev => [...prev, { role:"assistant", text:reply }]);

    } catch(e) {
      if (e.message !== "NO_KEY" && e.message !== "BAD_KEY") {
        setMessages(prev => [...prev, { role:"assistant", text:"❌ حدث خطأ أثناء تحليل الملف. تحقق من المفتاح وحجم الملف وأعد المحاولة.", error:true }]);
      }
    } finally { setLoading(false); }
  };

  const saveToBank = (text) => {
    const title = text.substring(0, 60) + (text.length > 60 ? "..." : "");
    setBank(b => [{ id:Date.now(), type:"صيغة", title, text, date:today() }, ...b]);
    toast("💾 تم الحفظ في بنك الخبرة");
  };

  const fileIcon = (f) => {
    if (isImage(f.file)) return "🖼";
    if (isPDF(f.file)) return "📄";
    if (isWord(f.file)) return "📝";
    return "📃";
  };

  const quickActions = [
    { label:"تحليل قانوني شامل",    text:"حلل هذا المستند قانونياً وأخرج: نوعه، أطرافه، البنود الجوهرية، المخاطر، والتوصيات." },
    { label:"استخرج البنود الرئيسية", text:"استخرج جميع البنود والشروط الرئيسية من هذا المستند." },
    { label:"نقاط الضعف والمخاطر",   text:"ما نقاط الضعف والمخاطر القانونية في هذا المستند؟" },
    { label:"ملخص تنفيذي",          text:"أعطني ملخصاً تنفيذياً مختصراً لهذا المستند في نقاط." },
    { label:"مقارنة مع النظام",      text:"قارن بنود هذا المستند مع أحكام النظام السعودي المنطبق." },
    { label:"ترجمة وتفسير",         text:"فسّر وترجم البنود الغامضة في هذا المستند إلى لغة واضحة." },
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 52px)" }}>

      {/* شريط معلومات */}
      <div style={{ background:"linear-gradient(135deg,rgba(34,197,94,0.06),rgba(184,146,42,0.04))", borderBottom:"1px solid rgba(34,197,94,0.15)", padding:"7px 20px", display:"flex", alignItems:"center", gap:8 }}>
        <span style={{ fontSize:13 }}>📎</span>
        <span style={{ fontSize:12, color:"#166534", fontWeight:600 }}>تحليل الملفات والمستندات</span>
        <span style={{ fontSize:11, color:"#4a8a5a", marginRight:"auto" }}>يدعم: صور • PDF • Word • ملفات نصية</span>
      </div>

      {/* نتائج المحادثة */}
      <div style={{ flex:1, overflowY:"auto", padding:"20px 24px", display:"flex", flexDirection:"column", gap:16 }}>
        {messages.length === 0 && (
          <div style={{ textAlign:"center", padding:"40px 20px", color:"#8a7a65" }}>
            <div style={{ fontSize:52, marginBottom:12, opacity:0.4 }}>📎</div>
            <div style={{ fontSize:14, fontWeight:700, color:"#5a4a35", marginBottom:6 }}>ارفع مستنداً لتحليله</div>
            <div style={{ fontSize:12, lineHeight:1.8 }}>
              يمكنك رفع: صورة لعقد أو حكم أو وثيقة<br/>
              ملف PDF • ملف Word • نص عادي<br/>
              ثم اكتب سؤالك أو اختر إجراءً سريعاً
            </div>
          </div>
        )}
        {messages.map((m, i) => (
          <div key={i} style={{ display:"flex", flexDirection:"column", alignItems: m.role==="user"?"flex-end":"flex-start", gap:4 }}>
            <div style={{
              maxWidth:"86%",
              background: m.role==="user" ? "linear-gradient(135deg,#b8922a,#d4a843)" : m.error ? "rgba(239,68,68,0.08)" : "#fff",
              color: m.role==="user" ? INK : "#2a1f0e",
              border: m.role==="user" ? "none" : m.error ? "1px solid rgba(239,68,68,0.2)" : "1px solid rgba(184,146,42,0.18)",
              borderRadius: m.role==="user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
              padding:"12px 16px", fontSize:13.5, lineHeight:1.85, whiteSpace:"pre-wrap", wordBreak:"break-word",
              fontFamily: m.role==="assistant" ? "'Amiri',serif" : "'Tajawal',sans-serif",
            }}>{m.text}</div>
            {m.role==="assistant" && !m.error && (
              <button onClick={()=>saveToBank(m.text)} style={{ fontSize:11, color:"#8a7a65", background:"none", border:"none", cursor:"pointer", padding:"2px 6px" }}>
                💾 حفظ في بنك الخبرة
              </button>
            )}
          </div>
        ))}
        {loading && (
          <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 0" }}>
            <Spinner small />
            <span style={{ fontSize:12, color:"#8a7a65" }}>يحلل المستند...</span>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* منطقة الإجراءات السريعة */}
      <div style={{ padding:"6px 20px", display:"flex", gap:6, flexWrap:"wrap", borderTop:"1px solid rgba(184,146,42,0.1)", background:"#faf7f0" }}>
        {quickActions.map((a,i) => (
          <button key={i} onClick={()=>setQuestion(a.text)}
            style={{ padding:"3px 11px", borderRadius:20, border:"1.5px solid rgba(34,197,94,0.3)", background:"#fff", color:"#166534", fontSize:11.5, fontWeight:600, cursor:"pointer" }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="#16a34a";e.currentTarget.style.background="rgba(34,197,94,0.06)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(34,197,94,0.3)";e.currentTarget.style.background="#fff";}}>
            {a.label}
          </button>
        ))}
      </div>

      {/* منطقة الإدخال */}
      <div style={{ padding:"12px 20px", background:"#fff", borderTop:"1px solid rgba(184,146,42,0.15)" }}>

        {/* الملفات المرفوعة */}
        {files.length > 0 && (
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
            {files.map(f => (
              <div key={f.id} style={{ display:"flex", alignItems:"center", gap:6, background:"rgba(184,146,42,0.08)", border:"1.5px solid rgba(184,146,42,0.25)", borderRadius:8, padding:"4px 10px", fontSize:12 }}>
                <span>{fileIcon(f)}</span>
                <span style={{ color:"#5a4a35", fontWeight:600, maxWidth:140, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{f.file.name}</span>
                <span style={{ color:"#8a7a65", fontSize:11 }}>({(f.file.size/1024).toFixed(0)} KB)</span>
                <button onClick={()=>removeFile(f.id)} style={{ background:"none", border:"none", cursor:"pointer", color:"#dc2626", fontSize:14, padding:"0 2px", lineHeight:1 }}>×</button>
              </div>
            ))}
          </div>
        )}

        {/* منطقة السحب والإفلات */}
        <div
          onDragOver={e=>{e.preventDefault();setDragOver(true);}}
          onDragLeave={()=>setDragOver(false)}
          onDrop={e=>{e.preventDefault();setDragOver(false);addFiles(e.dataTransfer.files);}}
          onClick={()=>fileInputRef.current?.click()}
          style={{
            border:`2px dashed ${dragOver?"#b8922a":"rgba(184,146,42,0.3)"}`,
            borderRadius:10, padding:"14px", textAlign:"center", cursor:"pointer", marginBottom:10,
            background: dragOver ? "rgba(184,146,42,0.06)" : "#faf7f0",
            transition:"all .2s"
          }}>
          <input ref={fileInputRef} type="file" multiple accept="image/*,.pdf,.doc,.docx,.txt" onChange={e=>addFiles(e.target.files)} style={{ display:"none" }} />
          <span style={{ fontSize:20 }}>📎</span>
          <span style={{ fontSize:12, color:"#8a7a65", marginRight:8 }}>اسحب الملفات هنا أو انقر للاختيار</span>
          <span style={{ fontSize:11, color:"#aaa" }}>(صور · PDF · Word · نص)</span>
        </div>

        {/* سؤال + زر التحليل */}
        <div style={{ display:"flex", gap:10, alignItems:"flex-end" }}>
          <textarea
            value={question}
            onChange={e=>setQuestion(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();analyze();} }}
            placeholder="اكتب سؤالك حول المستند... أو اتركه فارغاً للتحليل التلقائي"
            style={{ ...S.input, minHeight:46, maxHeight:120, resize:"none", lineHeight:1.7, flex:1 }}
            rows={2}
          />
          <button onClick={analyze} disabled={loading||(!files.length&&!question.trim())}
            style={{ ...S.btn, background:"linear-gradient(135deg,#166534,#22c55e)", color:"#fff", padding:"14px 18px", opacity:(loading||(!files.length&&!question.trim()))?0.6:1, flexShrink:0 }}>
            {loading ? <Spinner small /> : "تحليل ↑"}
          </button>
        </div>
      </div>
    </div>
  );
}

// SEARCH PAGE
// ══════════════════════════════════════════════════════════
function SearchPage({ systems, bank }) {
  const [q, setQ] = useState("");
  const [results, setResults] = useState(null);

  const doSearch = () => {
    const t = q.trim().toLowerCase();
    if (!t) return;
    const res = [];

    systems.forEach(s => {
      const text = s.text;
      const articlePattern = "المادة";
      let searchPos = 0;
      const articleStarts = [];

      while (true) {
        const found = text.indexOf(articlePattern, searchPos);
        if (found === -1) break;
        const after = text.substring(found+articlePattern.length, found+articlePattern.length+5).trim();
        if (after && (after[0]>='0'&&after[0]<='9'||after[0]==='('||after[0]==='ا')) { articleStarts.push(found); }
        searchPos = found+1;
      }

      if (articleStarts.length === 0) {
        if (text.toLowerCase().includes(t)) {
          const idx = text.toLowerCase().indexOf(t);
          res.push({ ref:"نظام — "+s.name, text:text.substring(Math.max(0,idx-50),idx+400), fullText:text, bc:"rgba(184,146,42,0.1)", btc:GOLD });
        }
        return;
      }

      for (let i=0;i<articleStarts.length;i++) {
        const artStart = articleStarts[i];
        const artEnd = i+1<articleStarts.length ? articleStarts[i+1] : text.length;
        const artText = text.substring(artStart,artEnd).trim();
        if (artText.toLowerCase().includes(t)) {
          const firstLine = artText.split("\n")[0].trim().substring(0,60);
          res.push({ ref:"نظام — "+s.name+" — "+firstLine, text:artText.substring(0,600), fullText:artText, bc:"rgba(184,146,42,0.1)", btc:GOLD });
        }
      }
    });

    bank.forEach(b => {
      if (b.title.toLowerCase().includes(t)||b.text.toLowerCase().includes(t))
        res.push({ ref:b.type+" — "+b.title, text:b.text.substring(0,400), fullText:b.text, bc:"rgba(59,130,246,0.1)", btc:"#2563eb" });
    });

    setResults(res);
  };

  const hi = txt => {
    if (!q.trim()) return txt;
    const safe = q.trim().replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    return txt.replace(new RegExp(safe,"gi"), m => `<mark style="background:rgba(184,146,42,0.2);color:#b8922a;border-radius:3px;padding:0 2px;">${m}</mark>`);
  };

  return (
    <div>
      <div style={{ ...S.card, padding:"20px", marginBottom:18 }}>
        <label style={S.label}>البحث في الأنظمة وبنك الخبرة</label>
        <div style={{ display:"flex", gap:9, background:"#faf7f0", border:"1.5px solid rgba(184,146,42,0.22)", borderRadius:9, padding:"7px 7px 7px 12px", alignItems:"center" }}>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()}
            placeholder="مادة — مصطلح — موضوع..." style={{ flex:1, background:"none", border:"none", outline:"none", color:"#2a1f0e", fontFamily:"'Tajawal',sans-serif", fontSize:13, direction:"rtl" }} />
          <button onClick={doSearch} style={{ background:"linear-gradient(135deg,#b8922a,#d4a843)", color:INK, border:"none", cursor:"pointer", padding:"8px 18px", borderRadius:7, fontFamily:"'Tajawal',sans-serif", fontSize:13, fontWeight:700 }}>🔍 بحث</button>
        </div>
      </div>
      {results===null && <div style={{ textAlign:"center", padding:"52px 0", color:"#8a7a65" }}><div style={{ fontSize:38, opacity:.2 }}>🔍</div><div style={{ fontSize:13, marginTop:8 }}>أدخل كلمة بحث للبدء</div></div>}
      {results&&results.length===0 && <div style={{ textAlign:"center", padding:"52px 0", color:"#8a7a65" }}><div style={{ fontSize:38, opacity:.2 }}>🔍</div><div style={{ fontSize:13, marginTop:8 }}>لم يُعثر على نتائج</div></div>}
      {results&&results.map((r,i) => (
        <div key={i} style={{ ...S.card, padding:"15px 18px", marginBottom:9, borderRight:"3px solid transparent", transition:"all .18s" }}
          onMouseEnter={e=>e.currentTarget.style.borderRightColor=GOLD}
          onMouseLeave={e=>e.currentTarget.style.borderRightColor="transparent"}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
            <div style={{ fontSize:12, fontWeight:700, color:GOLD }} dangerouslySetInnerHTML={{__html:hi(r.ref)}} />
            <div style={{ display:"flex", gap:6, alignItems:"center" }}>
              <span style={{ ...S.tag, background:r.bc, color:r.btc }}>{r.ref.split("—")[0].trim()}</span>
              <button onClick={()=>navigator.clipboard.writeText(r.fullText||r.text).then(()=>alert("تم النسخ")).catch(()=>alert("استخدم Ctrl+C"))}
                style={{ padding:"3px 10px", borderRadius:6, border:"1px solid rgba(184,146,42,0.3)", background:"none", color:GOLD, fontSize:11, cursor:"pointer", fontFamily:"'Tajawal',sans-serif" }}>
                📋 نسخ
              </button>
            </div>
          </div>
          <div style={{ fontSize:13, color:"#2a1f0e", lineHeight:1.85, whiteSpace:"pre-wrap", maxHeight:200, overflowY:"auto", background:"#faf7f0", borderRadius:6, padding:"8px 10px" }}
            dangerouslySetInnerHTML={{__html:hi(r.text)+(r.fullText&&r.fullText.length>r.text.length?"\n...":"")}} />
        </div>
      ))}
    </div>
  );
}

            <div style={{ fontSize:11.5, color:"#5a4a35", marginTop:7, lineHeight:1.65, background:"#faf7f0", borderRadius:6, padding:"7px 9px", maxHeight:68, overflow:"hidden" }}>
              {s.text.substring(0,160)}{s.text.length>160?"...":""}
            </div>
            <button onClick={()=>setViewIdx(i)} style={{ ...S.btn, ...S.btnO, width:"100%", justifyContent:"center", fontSize:12, padding:"7px", marginTop:10 }}>👁 عرض ونسخ</button>
          </div>
        ))}
      </div>
      {viewIdx!==null&&systems[viewIdx]&&(
        <Modal open title={systems[viewIdx].name} onClose={()=>setViewIdx(null)} wide>
          <div style={{ background:"#faf7f0", borderRadius:9, padding:"16px 18px", fontSize:13.5, lineHeight:2, color:"#2a1f0e", maxHeight:"58vh", overflowY:"auto", whiteSpace:"pre-wrap", wordBreak:"break-word" }}>{systems[viewIdx].text}</div>
          <div style={{ display:"flex", gap:9, marginTop:16, paddingTop:14, borderTop:"1px solid rgba(184,146,42,0.15)" }}>
            <button onClick={()=>copy(systems[viewIdx].text)} style={{ ...S.btn, ...S.btnP }}>📋 نسخ النص كاملاً</button>
            <button onClick={()=>setViewIdx(null)} style={{ ...S.btn, ...S.btnO }}>إغلاق</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

  const filtered = bankFilter==="all" ? bank : bank.filter(b=>b.type===bankFilter);
  const copy = text => navigator.clipboard.writeText(text).then(()=>toast("📋 تم النسخ")).catch(()=>toast("⚠️ استخدم Ctrl+C"));
  const del = i => { if (!confirm(`حذف "${bank[i].title}"؟`)) return; setBank(b=>b.filter((_,j)=>j!==i)); toast("🗑 تم الحذف"); };

  return (
    <div>
      <div style={{ display:"flex", borderRadius:8, overflow:"hidden", border:"1px solid rgba(184,146,42,0.22)", width:"fit-content", marginBottom:18 }}>

          <button key={v} onClick={()=>setBankFilter(v)} style={{ padding:"7px 17px", cursor:"pointer", fontFamily:"'Tajawal',sans-serif", fontSize:13, fontWeight:600, color:bankFilter===v?GOLD_L:"#5a4a35", background:bankFilter===v?INK:"#fff", border:"none" }}>{l}</button>

      {filtered.length===0 ? (
        <div style={{ textAlign:"center", padding:"52px 0", color:"#8a7a65" }}><div style={{ fontSize:40, opacity:.2 }}>🗂</div><div style={{ fontSize:13, marginTop:8 }}>{bankFilter==="all"?"لا توجد عناصر بعد":"لا توجد عناصر من هذا النوع"}</div></div>
      ) : (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:12 }}>
          {filtered.map(b => {
            const ri = bank.indexOf(b); const c = tc[b.type]||tc["صيغة"];

              <div key={b.id} style={{ ...S.card, padding:15, borderRight:"3px solid transparent", transition:"all .18s" }}
                onMouseEnter={e=>{e.currentTarget.style.borderRightColor=GOLD;e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.06)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderRightColor="transparent";e.currentTarget.style.boxShadow="none";}}>

                  <span style={{ ...S.tag, background:c.bg, color:c.c }}>{b.type}</span>
                  <span style={{ fontSize:11, color:"#8a7a65" }}>{b.date}</span>
                </div>
                <div style={{ fontSize:13, fontWeight:700, color:"#2a1f0e", marginBottom:4 }}>{b.title}</div>
                <div style={{ fontSize:12, color:"#5a4a35", lineHeight:1.65 }}>{b.text.substring(0,110)}{b.text.length>110?"...":""}</div>
                <div style={{ display:"flex", gap:6, marginTop:9 }}>
                  <button onClick={()=>setViewIdx(ri)} style={{ ...S.btn, ...S.btnO, flex:1, justifyContent:"center", fontSize:12, padding:"6px" }}>👁 عرض</button>
                  <button onClick={()=>del(ri)} style={{ ...S.btn, ...S.btnD, fontSize:12, padding:"6px 10px" }}>🗑</button>
                </div>

            );
          })}

      )}
      {viewIdx!==null&&bank[viewIdx]&&(
        <Modal open title={bank[viewIdx].title} onClose={()=>setViewIdx(null)} wide>

function AddSysModal({ open, onClose, setSystems, toast }) {

    setSystems(s => [{ id:Date.now(), name:name.trim(), text:text.trim(), note:note.trim(), date:today() }, ...s]);
    setName(""); setText(""); setNote(""); onClose(); toast("✅ تم حفظ النظام");
  };
  return (
    <Modal open={open} onClose={onClose} title="إضافة نظام جديد">

      <Fg label="النص الكامل للنظام *">
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"الصق نص النظام كاملاً هنا...\n\nالمادة الأولى: ...\nالمادة الثانية: ..."} style={{ ...S.input, minHeight:260, resize:"vertical", lineHeight:1.75 }} />

      <Fg label="ملاحظة (اختياري)" last><input value={note} onChange={e=>setNote(e.target.value)} placeholder="مثال: صدر بالمرسوم الملكي رقم..." style={S.input} /></Fg>
      <div style={{ display:"flex", gap:9, marginTop:18, paddingTop:14, borderTop:"1px solid rgba(184,146,42,0.15)" }}>
        <button onClick={save} style={{ ...S.btn, ...S.btnP }}>✓ حفظ النظام</button>
        <button onClick={onClose} style={{ ...S.btn, ...S.btnO }}>إلغاء</button>
      </div>
    </Modal>
  );
}

function SettingsModal({ open, onClose, apiKey, setApiKey, toast }) {
  const [k, setK] = useState("");
  useEffect(() => { if (open) setK(apiKey); }, [open, apiKey]);
  const save = () => {
    if (!k.trim()) { toast("⚠️ أدخل المفتاح"); return; }
    if (!k.trim().startsWith("sk-ant")) { toast("⚠️ المفتاح يبدأ بـ sk-ant"); return; }
    localStorage.setItem(STORAGE.key, k.trim());
    setApiKey(k.trim()); onClose(); toast("✅ تم حفظ المفتاح");
  };
  return (
    <Modal open={open} onClose={onClose} title="⚙️ إعدادات API">
      <Fg label="مفتاح Anthropic API *">
        <input type="password" value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-api03-..." style={S.input} autoFocus />
      </Fg>
      <div style={{ fontSize:12, color:"#8a7a65", lineHeight:1.75, marginBottom:8 }}>
        🔒 المفتاح يُحفظ في متصفحك فقط.<br/>
        احصل على مفتاح من: <a href="https://console.anthropic.com/settings/keys" target="_blank" style={{ color:GOLD }}>console.anthropic.com/settings/keys</a>
      </div>
      {apiKey && <div style={{ fontSize:12, color:"#16a34a", marginBottom:4 }}>✅ مفتاح محفوظ حالياً</div>}
      <div style={{ display:"flex", gap:9, marginTop:14, paddingTop:14, borderTop:"1px solid rgba(184,146,42,0.15)" }}>
        <button onClick={save} style={{ ...S.btn, ...S.btnP }}>✓ حفظ المفتاح</button>
        <button onClick={onClose} style={{ ...S.btn, ...S.btnO }}>إغلاق</button>
      </div>
    </Modal>
  );
}
