<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة خلف | التمران القانونية الخاصة</title>
</head>
<body style="margin:0;padding:0;">
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const GOLD = "#b8922a";
const GOLD_L = "#d4a843";
const INK = "#0d1117";

const S = {
  app: { display:"flex", minHeight:"100vh", fontFamily:"'Tajawal', sans-serif", direction:"rtl", background:"#faf7f0" },
  sidebar: { width:250, background:INK, display:"flex", flexDirection:"column", flexShrink:0, borderLeft:`1px solid rgba(184,146,42,0.15)` },
  sbBrand: { padding:"22px 18px 16px", borderBottom:"1px solid rgba(184,146,42,0.1)" },
  sbSeal: { width:38, height:38, background:`linear-gradient(135deg,${GOLD},${GOLD_L})`, borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"serif", fontSize:19, color:INK, fontWeight:700, marginBottom:10 },
  sbName: { fontSize:14, fontWeight:800, color:"#fff" },
  sbSub: { fontSize:10, color:GOLD, marginTop:2 },
  sbNav: { padding:"14px 0", flex:1, overflowY:"auto" },
  sbSec: { fontSize:9, color:"rgba(184,146,42,0.5)", fontWeight:700, letterSpacing:"1.5px", padding:"10px 18px 4px", textTransform:"uppercase" },
  sbFooter: { padding:"12px 18px", borderTop:"1px solid rgba(184,146,42,0.08)" },
  main: { flex:1, display:"flex", flexDirection:"column", overflow:"hidden" },
  topbar: { background:"rgba(250,247,240,0.95)", borderBottom:`1px solid rgba(184,146,42,0.18)`, padding:"11px 26px", display:"flex", alignItems:"center", gap:12 },
  content: { padding:"24px 26px", flex:1, overflowY:"auto" },
  card: { background:"#fff", border:`1px solid rgba(184,146,42,0.2)`, borderRadius:12 },
  btn: { display:"inline-flex", alignItems:"center", gap:6, padding:"8px 16px", borderRadius:8, fontFamily:"'Tajawal',sans-serif", fontSize:13, fontWeight:700, cursor:"pointer", border:"none", transition:"all .16s" },
  btnP: { background:`linear-gradient(135deg,${GOLD},${GOLD_L})`, color:INK },
  btnO: { background:"transparent", color:"#5a4a35", border:`1.5px solid rgba(184,146,42,0.25)` },
  btnD: { background:"rgba(239,68,68,0.07)", color:"#dc2626", border:"1.5px solid rgba(239,68,68,0.18)" },
  input: { width:"100%", background:"#faf7f0", border:`1.5px solid rgba(184,146,42,0.22)`, borderRadius:8, padding:"9px 12px", fontFamily:"'Tajawal',sans-serif", fontSize:13, color:"#2a1f0e", outline:"none", direction:"rtl", boxSizing:"border-box" },
  label: { display:"block", fontSize:12, fontWeight:700, color:"#5a4a35", marginBottom:5 },
  tag: { display:"inline-block", padding:"2px 9px", borderRadius:20, fontSize:11, fontWeight:600 },
};

function NavItem({ icon, label, id, active, onClick, badge }) {
  return (
    <div onClick={() => onClick(id)} style={{
      display:"flex", alignItems:"center", gap:10, padding:"10px 18px", cursor:"pointer",
      borderRight:`3px solid ${active ? GOLD : "transparent"}`,
      background: active ? "rgba(184,146,42,0.1)" : "transparent",
      color: active ? GOLD_L : "rgba(255,255,255,0.5)",
      fontSize:13, fontWeight:500, transition:"all .16s", userSelect:"none"
    }}>
      <span style={{ fontSize:15 }}>{icon}</span>
      <span style={{ flex:1 }}>{label}</span>
      {badge !== undefined && (
        <span style={{ background:"rgba(184,146,42,0.16)", color:GOLD_L, fontSize:10, fontWeight:700, padding:"1px 7px", borderRadius:20 }}>{badge}</span>
      )}
    </div>
  );
}

function Modal({ open, onClose, title, children, wide }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(13,17,23,0.5)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div onClick={e => e.stopPropagation()} style={{ background:"#fff", borderRadius:15, padding:28, width:"90%", maxWidth: wide ? 680 : 540, maxHeight:"88vh", overflowY:"auto", boxShadow:"0 8px 48px rgba(0,0,0,0.14)" }}>
        <div style={{ fontSize:15, fontWeight:800, color:"#2a1f0e", marginBottom:18, paddingBottom:13, borderBottom:`1px solid rgba(184,146,42,0.18)` }}>{title}</div>
        {children}
      </div>
    </div>
  );
}

function Spinner() {
  return <div style={{ width:24, height:24, border:`3px solid rgba(184,146,42,0.2)`, borderTopColor:GOLD, borderRadius:"50%", animation:"spin .8s linear infinite" }} />;
}

function Fg({ label, children, last }) {
  return <div style={{ marginBottom: last ? 0 : 15 }}><label style={S.label}>{label}</label>{children}</div>;
}

const today = () => new Date().toLocaleDateString("ar-SA", { year:"numeric", month:"2-digit", day:"2-digit" });

const STORAGE = { sys:"kh_sys3", bank:"kh_bank3", stats:"kh_stats3", key:"kh_apikey" };
const loadLS = (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } };
const saveLS = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

function App() {
  const [page, setPage] = useState("home");
  const [systems, setSystems] = useState(() => loadLS(STORAGE.sys, []));
  const [bank, setBank] = useState(() => loadLS(STORAGE.bank, []));
  const [stats, setStats] = useState(() => loadLS(STORAGE.stats, { cases:0, memos:0 }));
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(STORAGE.key) || "");
  const [modal, setModal] = useState(null);
  const [loading, setLoading] = useState(false);
  const [notifyMsg, setNotifyMsg] = useState("");
  const [bankFilter, setBankFilter] = useState("all");
  const [memoType, setMemoType] = useState("اعتراض");
  const [searchQ, setSearchQ] = useState("");
  const [searchResults, setSearchResults] = useState(null);
  const [analysisResult, setAnalysisResult] = useState(null);
  const [memoResult, setMemoResult] = useState(null);
  const notifTimer = useRef(null);

  useEffect(() => { saveLS(STORAGE.sys, systems); }, [systems]);
  useEffect(() => { saveLS(STORAGE.bank, bank); }, [bank]);
  useEffect(() => { saveLS(STORAGE.stats, stats); }, [stats]);

  const toast = msg => {
    setNotifyMsg(msg);
    clearTimeout(notifTimer.current);
    notifTimer.current = setTimeout(() => setNotifyMsg(""), 3200);
  };

  const callApi = async (prompt) => {
    if (!apiKey) { setModal("settings"); throw new Error("NO_KEY"); }
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:2000, messages:[{ role:"user", content:prompt }] })
    });
    if (r.status === 401) { toast("❌ المفتاح غير صحيح — تحقق من الإعدادات"); setModal("settings"); throw new Error("BAD_KEY"); }
    if (r.status === 429) { toast("⚠️ تجاوزت الحد — انتظر دقيقة وأعد المحاولة"); throw new Error("RATE_LIMIT"); }
    if (!r.ok) { toast("❌ خطأ من الخادم: " + r.status); throw new Error("SERVER_ERR"); }
    const d = await r.json();
    if (d.error) { toast("❌ " + (d.error.message || "خطأ من API")); throw new Error("API_ERR"); }
    return d.content?.[0]?.text || "";
  };

  const nav = (id) => { setPage(id); setSearchResults(null); setAnalysisResult(null); setMemoResult(null); };

  const pageTitles = { home:"لوحة التحكم", search:"البحث الذكي", analyzer:"تحليل القضية", draft:"توليد المذكرات", systems:"الأنظمة واللوائح", bank:"بنك الخبرة" };

  return (
    <div style={S.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Amiri:wght@400;700&display=swap');
        @keyframes spin { to { transform:rotate(360deg); } }
        * { box-sizing:border-box; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-thumb { background:rgba(184,146,42,0.2); border-radius:3px; }
      `}</style>

      {/* SIDEBAR */}
      <aside style={S.sidebar}>
        <div style={S.sbBrand}>
          <div style={S.sbSeal}>خ</div>
          <div style={S.sbName}>منصة خلف</div>
          <div style={S.sbSub}>التمران القانونية الخاصة</div>
        </div>
        <nav style={S.sbNav}>
          <div style={S.sbSec}>الرئيسية</div>
          <NavItem id="home" icon="🏛" label="لوحة التحكم" active={page==="home"} onClick={nav} />
          <NavItem id="search" icon="🔍" label="البحث الذكي" active={page==="search"} onClick={nav} />
          <div style={S.sbSec}>الأدوات</div>
          <NavItem id="analyzer" icon="⚖️" label="تحليل القضية" active={page==="analyzer"} onClick={nav} />
          <NavItem id="draft" icon="📝" label="توليد المذكرات" active={page==="draft"} onClick={nav} />
          <div style={S.sbSec}>المكتبة</div>
          <NavItem id="systems" icon="📋" label="الأنظمة واللوائح" active={page==="systems"} onClick={nav} badge={systems.length} />
          <NavItem id="bank" icon="🗂" label="بنك الخبرة" active={page==="bank"} onClick={nav} badge={bank.length} />
        </nav>
        <div style={S.sbFooter}>
          <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:10 }}>
            <div style={{ width:32, height:32, background:`linear-gradient(135deg,${GOLD},${GOLD_L})`, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:800, color:INK, flexShrink:0 }}>خ</div>
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:"#fff" }}>خلف التمران</div>
              <div style={{ fontSize:10, color:GOLD }}>محامٍ — المنطقة الشرقية</div>
            </div>
          </div>
          <button onClick={() => setModal("settings")} style={{ width:"100%", background:"rgba(184,146,42,0.08)", border:"1px solid rgba(184,146,42,0.2)", color:"rgba(255,255,255,0.6)", padding:"8px 0", borderRadius:8, fontFamily:"'Tajawal',sans-serif", fontSize:12, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
            ⚙️ إعدادات API
            <span style={{ width:7, height:7, borderRadius:"50%", background: apiKey ? "#22c55e" : "#dc2626" }} />
          </button>
        </div>
      </aside>

      {/* MAIN */}
      <main style={S.main}>
        <header style={S.topbar}>
          <div style={{ fontSize:16, fontWeight:800, color:"#2a1f0e", flex:1 }}>{pageTitles[page]}</div>
          {page==="systems" && <button onClick={()=>setModal("addSys")} style={{...S.btn,...S.btnP}}>+ إضافة نظام</button>}
          {page==="bank" && <button onClick={()=>setModal("addBank")} style={{...S.btn,...S.btnP}}>+ إضافة عنصر</button>}
          {page==="home" && <button onClick={()=>nav("analyzer")} style={{...S.btn,...S.btnP}}>تحليل قضية جديدة</button>}
        </header>

        <div style={S.content}>
          {page==="home" && <HomePage systems={systems} bank={bank} stats={stats} nav={nav} setSearchQ={setSearchQ} setPage={setPage} setSearchResults={setSearchResults} />}
          {page==="search" && <SearchPage systems={systems} bank={bank} initQ={searchQ} results={searchResults} setResults={setSearchResults} />}
          {page==="analyzer" && <AnalyzerPage systems={systems} callApi={callApi} loading={loading} setLoading={setLoading} result={analysisResult} setResult={setAnalysisResult} stats={stats} setStats={setStats} toast={toast} />}
          {page==="draft" && <DraftPage systems={systems} callApi={callApi} loading={loading} setLoading={setLoading} result={memoResult} setResult={setMemoResult} memoType={memoType} setMemoType={setMemoType} stats={stats} setStats={setStats} bank={bank} setBank={setBank} toast={toast} />}
          {page==="systems" && <SystemsPage systems={systems} setSystems={setSystems} toast={toast} />}
          {page==="bank" && <BankPage bank={bank} setBank={setBank} bankFilter={bankFilter} setBankFilter={setBankFilter} toast={toast} />}
        </div>
      </main>

      <AddSysModal open={modal==="addSys"} onClose={()=>setModal(null)} setSystems={setSystems} toast={toast} />
      <AddBankModal open={modal==="addBank"} onClose={()=>setModal(null)} setBank={setBank} toast={toast} />
      <SettingsModal open={modal==="settings"} onClose={()=>setModal(null)} apiKey={apiKey} setApiKey={setApiKey} toast={toast} />

      {notifyMsg && (
        <div style={{ position:"fixed", bottom:20, left:20, background:INK, color:"#fff", padding:"11px 18px", borderRadius:9, fontSize:13, fontWeight:600, borderRight:`3px solid ${GOLD}`, zIndex:9999, maxWidth:300, boxShadow:"0 4px 20px rgba(0,0,0,0.2)" }}>
          {notifyMsg}
        </div>
      )}
    </div>
  );
}

// ── HOME ────────────────────────────────────────────────
function HomePage({ systems, bank, stats, nav, setSearchQ, setPage, setSearchResults }) {
  const [q, setQ] = useState("");

  const doSearch = () => {
    if (!q.trim()) return;
    setSearchQ(q);
    const t = q.trim().toLowerCase();
    const res = [];
    systems.forEach(s => {
      if (s.name.toLowerCase().includes(t) || s.text.toLowerCase().includes(t)) {
        const idx = s.text.toLowerCase().indexOf(t);
        const snippet = idx >= 0 ? s.text.substring(Math.max(0,idx-60), idx+220) : s.text.substring(0,220);
        res.push({ ref:"نظام — "+s.name, text:snippet, badge:"نظام", bc:"rgba(184,146,42,0.1)", btc:"#b8922a" });
      }
    });
    bank.forEach(b => {
      if (b.title.toLowerCase().includes(t) || b.text.toLowerCase().includes(t))
        res.push({ ref:b.type+" — "+b.title, text:b.text.substring(0,220), badge:b.type, bc:"rgba(59,130,246,0.1)", btc:"#2563eb" });
    });
    setSearchResults(res);
    setPage("search");
  };

  const recent = [...systems.map(s=>({type:"نظام",label:s.name,date:s.date})), ...bank.map(b=>({type:b.type,label:b.title,date:b.date}))].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
  const tc = {نظام:{bg:"rgba(184,146,42,0.1)",c:"#b8922a"},حكم:{bg:"rgba(34,197,94,0.1)",c:"#16a34a"},دفع:{bg:"rgba(59,130,246,0.1)",c:"#2563eb"},صيغة:{bg:"rgba(168,85,247,0.1)",c:"#7c3aed"},ملاحظة:{bg:"rgba(239,68,68,0.1)",c:"#dc2626"}};

  return (
    <div>
      <div style={{ background:`linear-gradient(135deg,${INK},#1a2332)`, borderRadius:16, padding:"30px 34px", marginBottom:20, position:"relative", overflow:"hidden" }}>
        <div style={{ fontSize:20, fontWeight:900, color:"#fff", marginBottom:4 }}>مرحباً في منصتك القانونية</div>
        <div style={{ fontSize:12, color:"rgba(255,255,255,0.38)", marginBottom:20 }}>ابحث في الأنظمة — حلل القضايا — أنشئ مذكراتك</div>
        <div style={{ display:"flex", gap:9, background:"rgba(255,255,255,0.06)", border:"1px solid rgba(184,146,42,0.2)", borderRadius:9, padding:"7px 7px 7px 14px", alignItems:"center" }}>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} placeholder="ابحث في الأنظمة وبنك الخبرة..." style={{ flex:1, background:"none", border:"none", outline:"none", color:"#fff", fontFamily:"'Tajawal',sans-serif", fontSize:13, direction:"rtl" }} />
          <button onClick={doSearch} style={{ background:`linear-gradient(135deg,${GOLD},${GOLD_L})`, color:INK, border:"none", cursor:"pointer", padding:"8px 18px", borderRadius:7, fontFamily:"'Tajawal',sans-serif", fontSize:13, fontWeight:700 }}>🔍 بحث</button>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:20 }}>
        {[
          {icon:"⚖️", title:"تحليل قضية", desc:"أدخل الوقائع واحصل على التكييف القانوني والدفوع", id:"analyzer"},
          {icon:"📝", title:"إنشاء مذكرة", desc:"توليد مذكرات قضائية احترافية بالذكاء الاصطناعي", id:"draft"},
          {icon:"📋", title:"إضافة نظام", desc:"الصق نص النظام كاملاً وابنِ مكتبتك القانونية", id:"systems"},
        ].map(x => (
          <div key={x.id} onClick={()=>nav(x.id)} style={{ ...S.card, padding:"20px", cursor:"pointer", transition:"all .2s" }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=GOLD;e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 28px rgba(0,0,0,0.09)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(184,146,42,0.2)";e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
            <div style={{ fontSize:24, marginBottom:8 }}>{x.icon}</div>
            <div style={{ fontSize:14, fontWeight:800, color:"#2a1f0e", marginBottom:4 }}>{x.title}</div>
            <div style={{ fontSize:11.5, color:"#8a7a65", lineHeight:1.6 }}>{x.desc}</div>
          </div>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:20 }}>
        {[
          {ico:"📋", val:systems.length, label:"نظام مضاف", bg:"rgba(184,146,42,0.1)"},
          {ico:"⚖️", val:stats.cases, label:"قضية محللة", bg:"rgba(59,130,246,0.1)"},
          {ico:"📝", val:stats.memos, label:"مذكرة منشأة", bg:"rgba(34,197,94,0.1)"},
          {ico:"🗂", val:bank.length, label:"عنصر بنك الخبرة", bg:"rgba(168,85,247,0.1)"},
        ].map((x,i) => (
          <div key={i} style={{ ...S.card, padding:"15px 17px", display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:40, height:40, borderRadius:9, background:x.bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, flexShrink:0 }}>{x.ico}</div>
            <div><div style={{ fontSize:22, fontWeight:900, color:"#2a1f0e" }}>{x.val}</div><div style={{ fontSize:11, color:"#8a7a65" }}>{x.label}</div></div>
          </div>
        ))}
      </div>

      <div style={{ ...S.card, padding:"18px 20px" }}>
        <div style={{ fontSize:14, fontWeight:800, color:"#2a1f0e", marginBottom:12 }}>آخر الإضافات</div>
        {recent.length === 0 ? (
          <div style={{ textAlign:"center", padding:"32px 0", color:"#8a7a65" }}>
            <div style={{ fontSize:36, opacity:.2 }}>📂</div>
            <div style={{ fontSize:13, marginTop:8 }}>لا توجد بيانات — ابدأ بإضافة نظام أو عنصر</div>
          </div>
        ) : recent.map((x,i) => {
          const c = tc[x.type] || tc["نظام"];
          return (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0", borderBottom: i<recent.length-1?"1px solid rgba(184,146,42,0.07)":"none" }}>
              <span style={{ ...S.tag, background:c.bg, color:c.c }}>{x.type}</span>
              <span style={{ flex:1, fontSize:13, fontWeight:500, color:"#2a1f0e" }}>{x.label}</span>
              <span style={{ fontSize:11, color:"#8a7a65" }}>{x.date}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── SEARCH ──────────────────────────────────────────────
function SearchPage({ systems, bank, initQ, results, setResults }) {
  const [q, setQ] = useState(initQ || "");

  useEffect(() => { if (initQ) { setQ(initQ); } }, [initQ]);

  const doSearch = () => {
    const t = q.trim().toLowerCase();
    if (!t) return;
    const res = [];
    systems.forEach(s => {
      if (s.name.toLowerCase().includes(t) || s.text.toLowerCase().includes(t)) {
        const idx = s.text.toLowerCase().indexOf(t);
        const snippet = idx >= 0 ? s.text.substring(Math.max(0,idx-60), idx+220) : s.text.substring(0,220);
        res.push({ ref:"نظام — "+s.name, text:snippet, badge:"نظام", bc:"rgba(184,146,42,0.1)", btc:"#b8922a" });
      }
    });
    bank.forEach(b => {
      if (b.title.toLowerCase().includes(t) || b.text.toLowerCase().includes(t))
        res.push({ ref:b.type+" — "+b.title, text:b.text.substring(0,220), badge:b.type, bc:"rgba(59,130,246,0.1)", btc:"#2563eb" });
    });
    setResults(res);
  };

  const hi = txt => {
    if (!q.trim()) return txt;
    const safe = q.trim().replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    return txt.replace(new RegExp(safe,"gi"), m => `<mark style="background:rgba(184,146,42,0.2);color:#b8922a;border-radius:3px;padding:0 2px;">${m}</mark>`);
  };

  return (
    <div>
      <div style={{ ...S.card, padding:"20px", marginBottom:18 }}>
        <label style={S.label}>البحث في الأنظمة وبنك الخبرة</label>
        <div style={{ display:"flex", gap:9, background:"#faf7f0", border:`1.5px solid rgba(184,146,42,0.22)`, borderRadius:9, padding:"7px 7px 7px 12px", alignItems:"center" }}>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} placeholder="مصطلح — مادة — موضوع..." style={{ flex:1, background:"none", border:"none", outline:"none", color:"#2a1f0e", fontFamily:"'Tajawal',sans-serif", fontSize:13, direction:"rtl" }} />
          <button onClick={doSearch} style={{ background:`linear-gradient(135deg,${GOLD},${GOLD_L})`, color:INK, border:"none", cursor:"pointer", padding:"8px 18px", borderRadius:7, fontFamily:"'Tajawal',sans-serif", fontSize:13, fontWeight:700 }}>🔍 بحث</button>
        </div>

function parseAnalysis(raw) {
  const sections = []; let cur = null;
  raw.split("\n").filter(l=>l.trim()).forEach(line => {
    const t = line.trim();
    if (/^#+\s/.test(t)||/^\d+\.\s/.test(t)||/^[١٢٣٤٥٦٧٨٩]\.\s/.test(t)) {
      if (cur) sections.push(cur);
      cur = { title:t.replace(/^#+\s|^\d+\.\s|^[١٢٣٤٥٦٧٨٩]\.\s/,"").trim(), items:[] };
    } else if (cur) {
      if (t.startsWith("-")||t.startsWith("•")) cur.items.push({type:"pill",neg:false,text:t.replace(/^[-•]\s*/,"")});
      else if (t.startsWith("⚠")) cur.items.push({type:"pill",neg:true,text:t.replace(/^⚠\s*/,"")});
      else cur.items.push({type:"text",text:t});
    }
  });
  if (cur) sections.push(cur);
  return sections.length ? sections : [{title:"التحليل",items:[{type:"text",text:raw}]}];
}

  const tc = { حكم:{bg:"rgba(34,197,94,0.1)",c:"#16a34a"}, دفع:{bg:"rgba(59,130,246,0.1)",c:"#2563eb"}, صيغة:{bg:"rgba(184,146,42,0.1)",c:"#b8922a"}, ملاحظة:{bg:"rgba(239,68,68,0.1)",c:"#dc2626"} };
  const filtered = bankFilter==="all" ? bank : bank.filter(b=>b.type===bankFilter);
  const copy = text => navigator.clipboard.writeText(text).then(()=>toast("📋 تم النسخ")).catch(()=>toast("⚠️ لم يتمكن من النسخ"));
  const del = i => { if (!confirm(`حذف "${bank[i].title}"؟`)) return; setBank(b=>b.filter((_,j)=>j!==i)); toast("🗑 تم الحذف"); };

  return (
    <div>
      <div style={{ display:"flex", borderRadius:8, overflow:"hidden", border:`1px solid rgba(184,146,42,0.22)`, width:"fit-content", marginBottom:18 }}>
        {[["all","الكل"],["حكم","أحكام"],["دفع","دفوع"],["صيغة","صيغ"],["ملاحظة","ملاحظات"]].map(([v,l]) => (
          <button key={v} onClick={()=>setBankFilter(v)} style={{ padding:"7px 17px", cursor:"pointer", fontFamily:"'Tajawal',sans-serif", fontSize:13, fontWeight:600, color:bankFilter===v?GOLD_L:"#5a4a35", background:bankFilter===v?INK:"#fff", border:"none" }}>{l}</button>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div style={{ textAlign:"center", padding:"52px 0", color:"#8a7a65" }}>
          <div style={{ fontSize:40, opacity:.2 }}>🗂</div>
          <div style={{ fontSize:13, marginTop:8 }}>{bankFilter==="all" ? "لا توجد عناصر — انقر \"+ إضافة عنصر\"" : "لا توجد عناصر من هذا النوع"}</div>
        </div>
      ) : (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:12 }}>
          {filtered.map(b => {
            const ri = bank.indexOf(b);
            const c = tc[b.type] || tc["صيغة"];
            return (
              <div key={b.id} style={{ ...S.card, padding:15, borderRight:"3px solid transparent", transition:"all .18s" }}
                onMouseEnter={e=>{e.currentTarget.style.borderRightColor=GOLD;e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.06)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderRightColor="transparent";e.currentTarget.style.boxShadow="none";}}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
                  <span style={{ ...S.tag, background:c.bg, color:c.c }}>{b.type}</span>
                  <span style={{ fontSize:11, color:"#8a7a65" }}>{b.date}</span>
                </div>
                <div style={{ fontSize:13, fontWeight:700, color:"#2a1f0e", marginBottom:4 }}>{b.title}</div>
                <div style={{ fontSize:12, color:"#5a4a35", lineHeight:1.65 }}>{b.text.substring(0,110)}{b.text.length>110?"...":""}</div>
                <div style={{ display:"flex", gap:6, marginTop:9 }}>
                  <button onClick={()=>setViewIdx(ri)} style={{ ...S.btn, ...S.btnO, flex:1, justifyContent:"center", fontSize:12, padding:"6px" }}>👁 عرض</button>
                  <button onClick={()=>del(ri)} style={{ ...S.btn, ...S.btnD, fontSize:12, padding:"6px 10px" }}>🗑</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {viewIdx !== null && bank[viewIdx] && (
        <Modal open title={bank[viewIdx].title} onClose={()=>setViewIdx(null)} wide>
          <div style={{ background:"#faf7f0", borderRadius:9, padding:"16px 18px", fontSize:13.5, lineHeight:2, color:"#2a1f0e", maxHeight:"58vh", overflowY:"auto", whiteSpace:"pre-wrap", wordBreak:"break-word" }}>
            {bank[viewIdx].text}
          </div>
          <div style={{ display:"flex", gap:9, marginTop:16, paddingTop:14, borderTop:`1px solid rgba(184,146,42,0.15)` }}>
            <button onClick={()=>copy(bank[viewIdx].text)} style={{ ...S.btn, ...S.btnP }}>📋 نسخ</button>
            <button onClick={()=>setViewIdx(null)} style={{ ...S.btn, ...S.btnO }}>إغلاق</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── MODALS ──────────────────────────────────────────────
function AddSysModal({ open, onClose, setSystems, toast }) {
  const [name, setName] = useState(""); const [text, setText] = useState(""); const [note, setNote] = useState("");
  const save = () => {
    if (!name.trim()) { toast("⚠️ أدخل اسم النظام"); return; }
    if (!text.trim()) { toast("⚠️ الصق نص النظام"); return; }
    setSystems(s => [{ id:Date.now(), name:name.trim(), text:text.trim(), note:note.trim(), date:today() }, ...s]);
    setName(""); setText(""); setNote(""); onClose(); toast("✅ تم حفظ النظام");
  };
  return (
    <Modal open={open} onClose={onClose} title="إضافة نظام جديد">
      <Fg label="اسم النظام *"><input value={name} onChange={e=>setName(e.target.value)} placeholder="مثال: نظام المرافعات الشرعية" style={S.input} autoFocus /></Fg>
      <Fg label="النص الكامل للنظام *">
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"الصق نص النظام كاملاً هنا\nيمكنك نسخه من PDF أو Word أو أي مصدر...\n\nالمادة الأولى: ...\nالمادة الثانية: ..."} style={{ ...S.input, minHeight:260, resize:"vertical", lineHeight:1.75 }} />
      </Fg>
      <Fg label="ملاحظة (اختياري)" last><input value={note} onChange={e=>setNote(e.target.value)} placeholder="مثال: صدر بالمرسوم الملكي رقم..." style={S.input} /></Fg>
      <div style={{ display:"flex", gap:9, marginTop:18, paddingTop:14, borderTop:`1px solid rgba(184,146,42,0.15)` }}>
        <button onClick={save} style={{ ...S.btn, ...S.btnP }}>✓ حفظ النظام</button>
        <button onClick={onClose} style={{ ...S.btn, ...S.btnO }}>إلغاء</button>
      </div>
    </Modal>
  );
}

function AddBankModal({ open, onClose, setBank, toast }) {
  const [type, setType] = useState("حكم"); const [title, setTitle] = useState(""); const [text, setText] = useState("");
  const save = () => {
    if (!title.trim()) { toast("⚠️ أدخل عنواناً"); return; }
    if (!text.trim()) { toast("⚠️ أدخل المحتوى"); return; }
    setBank(b => [{ id:Date.now(), type, title:title.trim(), text:text.trim(), date:today() }, ...b]);
    setTitle(""); setText(""); setType("حكم"); onClose(); toast("✅ تم الحفظ");
  };
  return (
    <Modal open={open} onClose={onClose} title="إضافة عنصر لبنك الخبرة">
      <Fg label="النوع"><select value={type} onChange={e=>setType(e.target.value)} style={S.input}>{["حكم","دفع","صيغة","ملاحظة"].map(x=><option key={x}>{x}</option>)}</select></Fg>
      <Fg label="العنوان *"><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="عنوان مختصر ودقيق" style={S.input} autoFocus /></Fg>
      <Fg label="المحتوى *" last><textarea value={text} onChange={e=>setText(e.target.value)} placeholder="أدخل النص..." style={{ ...S.input, minHeight:130, resize:"vertical", lineHeight:1.75 }} /></Fg>
      <div style={{ display:"flex", gap:9, marginTop:18, paddingTop:14, borderTop:`1px solid rgba(184,146,42,0.15)` }}>
        <button onClick={save} style={{ ...S.btn, ...S.btnP }}>✓ حفظ</button>
        <button onClick={onClose} style={{ ...S.btn, ...S.btnO }}>إلغاء</button>
      </div>
    </Modal>
  );
}

function SettingsModal({ open, onClose, apiKey, setApiKey, toast }) {
  const [k, setK] = useState("");
  useEffect(() => { if (open) setK(apiKey); }, [open, apiKey]);
  const save = () => {
    if (!k.trim()) { toast("⚠️ أدخل المفتاح"); return; }
    if (!k.trim().startsWith("sk-ant")) { toast("⚠️ المفتاح يبدأ بـ sk-ant"); return; }
    localStorage.setItem(STORAGE.key, k.trim());
    setApiKey(k.trim()); onClose(); toast("✅ تم حفظ المفتاح");
  };
  return (
    <Modal open={open} onClose={onClose} title="⚙️ إعدادات API">
      <Fg label="مفتاح Anthropic API *">
        <input type="password" value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-api03-..." style={S.input} autoFocus />
      </Fg>
      <div style={{ fontSize:12, color:"#8a7a65", lineHeight:1.75, marginBottom:8 }}>
        🔒 المفتاح يُحفظ في متصفحك فقط ولا يخرج لأي جهة غير Anthropic.<br/>
        احصل على مفتاح من: <a href="https://console.anthropic.com/settings/keys" target="_blank" style={{ color:GOLD }}>console.anthropic.com/settings/keys</a>
      </div>
      {apiKey && <div style={{ fontSize:12, color:"#16a34a", marginBottom:4 }}>✅ مفتاح محفوظ حالياً</div>}
      <div style={{ display:"flex", gap:9, marginTop:14, paddingTop:14, borderTop:`1px solid rgba(184,146,42,0.15)` }}>
        <button onClick={save} style={{ ...S.btn, ...S.btnP }}>✓ حفظ المفتاح</button>
        <button onClick={onClose} style={{ ...S.btn, ...S.btnO }}>إغلاق</button>
      </div>
    </Modal>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
